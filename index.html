        padding: 20px;
      }

      h2 {
        text-align: center;
      }

      .container {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        cursor: grab;
      }

      .card {
        min-width: 300px;
        background: white;
        border-radius: 14px;
        padding: 12px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
      }

      .card img {
        width: 100%;
        height: 300px;
        border-radius: 10px;
        object-fit: cover;
      }

      .name {
        font-size: 17px;
        font-weight: bold;
        margin-top: 8px;
      }

      .row {
        font-size: 12px;
        margin: 4px 0;
      }

      .group {
        border-top: 1px solid #eee;
        padding-top: 6px;
        margin-top: 6px;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 15px;
        position: sticky;
        top: 0;
        background: #f4f6f9;
        padding: 10px;
        z-index: 10;
      }

      .modal {
        display: none;
        position: fixed;
        backdrop-filter: blur(3px);
        background: rgba(0, 0, 0, 0.82);
        width: 100%;
        height: 100%;
        justify-content: center;
        align-items: center;
      }

      .modal img {
        max-width: 80vw;
        max-height: 85vh;
      }

      .close-btn {
        position: absolute;
        top: 10px;
        right: 20px;
        background: white;
        border-radius: 50%;
        padding: 6px 10px;
        cursor: pointer;
      }
    </style>
  </head>

      // 🔥 FILTER LOGIC (important)
      const profiles = rawProfiles.filter(p =>
        (p.profileSource || "").toLowerCase().includes("mangalyam")
      );

      const container = document.getElementById("container");

      const NA = (v) => (v ? v : "NA");

      function getHeightInInches(h) {
        const [f, i] = (h || "0.0").split(".");
        return parseInt(f) * 12 + parseInt(i || 0);
      }

      function applySort() {
        const type = document.getElementById("sortBy").value;
        const order = document.getElementById("sortOrder").value;

        profiles.sort((a, b) => {
          let A, B;

          switch (type) {
            case "age":
              A = parseFloat(a.age);
              B = parseFloat(b.age);
              break;
            case "lpa":
              A = parseFloat(a.lpa || 0);
              B = parseFloat(b.lpa || 0);
              break;
            case "location":
              return order === "asc"
                ? a.location.localeCompare(b.location)
                : b.location.localeCompare(a.location);
            case "height":
              A = getHeightInInches(a.height);
              B = getHeightInInches(b.height);
              break;
          }

          return order === "asc" ? A - B : B - A;
        });

        render();
      }

      function openModal(img) {
        document.getElementById("modal").style.display = "flex";
        document.getElementById("modalImg").src =
          "https://lh3.googleusercontent.com/d/" + img;
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
      }

      function outsideClick(e) {
        if (e.target.id === "modal") closeModal();
      }

      function render() {
        container.innerHTML = "";

        profiles.forEach((p) => {
          const card = document.createElement("div");
          card.className = "card";

          const imgUrl =
            "https://lh3.googleusercontent.com/d/" + p.image + "=s300-c";

          card.innerHTML = `
            <img src="${imgUrl}" onclick="openModal('${p.image}')">
            <div class="name">${NA(p.name)}</div>

            <div style="margin:6px 0;font-weight:600;">
              👤 ${NA(p.age)}
            </div>

            <div class="group">
              <div class="row">📍 ${NA(p.location)}</div>
              <div class="row">💰 ${NA(p.lpa)}</div>
              <div class="row">📏 ${NA(p.height)}</div>
            </div>
          `;

          container.appendChild(card);
        });
      }
